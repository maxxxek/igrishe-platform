<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ИГРИЩЕ — ТВ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ededed; --card-bg: rgba(255,255,255,0.55); --card-border: rgba(255,255,255,0.5);
            --text: #111; --accent: #7c3aed; --accent2: #f472b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rubik', sans-serif; font-weight: 500;
            background: var(--bg); min-height: 100vh; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }
        .container { width: 100%; max-width: 950px; }

        .nav {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(18px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 0 0 24px 24px;
            padding: 15px 30px; margin-bottom: 30px;
            position: sticky; top: 0; z-index: 999;
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo {
            width: 55px; height: 55px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center;
            overflow: visible; border: 3px solid #e3e3e3;
            cursor: pointer; transition: 0.3s; margin-top: 25px;
        }
        .nav-logo:hover { transform: scale(1.1); }
        .nav-logo img { width: 130%; height: 130%; object-fit: contain; margin-top: -10px; }
        .profile-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 40px;
            padding: 8px 18px; cursor: default; transition: 0.3s; position: relative;
        }
        .profile-badge:hover { background: rgba(255,255,255,0.8); transform: scale(1.05); }
        .profile-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #a53cff, #3fffd2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white; font-weight: 700;
        }
        .profile-text { font-weight: 700; color: var(--text); font-size: 15px; }
        .profile-arrow { font-size: 12px; transition: 0.3s; }
        .profile-badge:hover .profile-arrow { transform: rotate(180deg); }
        .profile-dropdown {
            position: absolute; top: 110%; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(18px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 16px;
            padding: 10px 0; min-width: 180px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-8px);
            transition: all 0.3s; z-index: 100;
        }
        .profile-badge:hover .profile-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .profile-dropdown::before { content: ''; position: absolute; top: -15px; left: 0; width: 100%; height: 15px; background: transparent; }
        .profile-dropdown-item {
            padding: 12px 20px; cursor: pointer; font-size: 15px; font-weight: 600;
            color: #333; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .profile-dropdown-item:hover { background: rgba(124,58,237,0.08); color: #7c3aed; }
        .profile-dropdown-divider { height: 1px; background: #e0e0e0; margin: 5px 0; }
        .nav-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; border: none; border-radius: 30px;
            padding: 10px 20px; font-weight: 700; font-size: 16px; cursor: pointer;
        }
        .nav-btn:hover { transform: scale(1.05); }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 2px solid var(--card-border); border-radius: 24px;
            padding: 30px; margin: 15px 0;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        .logo-title {
            font-size: 48px; font-weight: 900; text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 10px;
        }
        #lobbyGameName { background: none !important; -webkit-background-clip: unset !important; -webkit-text-fill-color: var(--text) !important; color: var(--text); }
        .subtitle { text-align: center; opacity: 0.6; font-size: 16px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        .section-title { text-align: center; font-size: 20px; opacity: 0.7; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .center { text-align: center; }

        .tier-slider {
            display: flex; justify-content: center; background: rgba(200,200,200,0.2);
            border-radius: 50px; padding: 5px; margin: 20px auto; max-width: 380px; position: relative;
        }
        .tier-slider-bg {
            position: absolute; top: 5px; left: 5px;
            width: calc(50% - 5px); height: calc(100% - 10px);
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 45px;
            transition: all 0.4s; z-index: 0;
        }
        .tier-slider.premium .tier-slider-bg { left: 50%; background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .tier-tab {
            flex: 1; text-align: center; padding: 14px 20px; border-radius: 45px;
            cursor: pointer; font-weight: 700; font-size: 16px;
            position: relative; z-index: 1; color: #888; transition: color 0.3s;
        }
        .tier-tab.active { color: #111; font-weight: 900; }
        .tier-slider.premium .tier-tab.active { color: white; }

        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin: 20px 0; }
        .game-card {
            background: rgba(255,255,255,0.5); border: 3px solid rgba(255,255,255,0.5);
            border-radius: 20px; padding: 25px 15px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .game-card.selected { border-color: var(--accent); background: rgba(124,58,237,0.05); }
        .game-icon-emoji { font-size: 40px; }
        .game-name { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .game-desc { font-size: 13px; opacity: 0.6; }
        .game-badge { display: inline-block; margin-top: 10px; padding: 5px 14px; background: rgba(124,58,237,0.1); border-radius: 20px; font-size: 11px; }

        .room-code { font-size: 60px; letter-spacing: 12px; padding: 15px 40px; background: rgba(255,255,255,0.7); border-radius: 16px; display: inline-block; font-weight: 900; color: var(--text); }
        .highlight { color: var(--accent); font-weight: 700; }
        .players-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .player-card { background: rgba(255,255,255,0.6); padding: 10px 18px; border-radius: 14px; font-weight: 700; font-size: 16px; }

        .btn {
            display: inline-block; padding: 14px 40px; font-weight: 800; font-size: 20px;
            border: none; border-radius: 50px; cursor: pointer; color: white; margin: 6px;
            background: linear-gradient(135deg, var(--accent), #a855f7, var(--accent2));
            box-shadow: 0 6px 24px rgba(124,58,237,0.4); transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; color: #999; }
        .btn-secondary { background: rgba(255,255,255,0.6); color: var(--text); }
        .empty-state { text-align: center; opacity: 0.4; padding: 20px; }

        /* КНОПКА СНИЗУ ЗАКРЕПЛЕНА */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(18px);
            border-top: 2px solid rgba(255,255,255,0.7);
            padding: 15px; text-align: center; z-index: 998;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ШАПКА -->
    <div class="nav">
        <div class="nav-left">
            <div class="nav-logo" onclick="window.location.href='/'">
                <img src="/static/icons/logo.png" alt="ИГРИЩЕ" onerror="this.innerHTML='🎮'">
            </div>
            <div class="profile-badge">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <span class="profile-text" id="profileText">Гость</span>
                <span class="profile-arrow">▼</span>
                <div class="profile-dropdown">
                    <div class="profile-dropdown-item" onclick="window.location.href='/frontend/dashboard.html?page=profile'">👤 Профиль</div>
                    <div class="profile-dropdown-item" onclick="window.location.href='/frontend/dashboard.html?page=wallet'">💰 Кошелёк</div>
                    <div class="profile-dropdown-item" onclick="window.location.href='/frontend/dashboard.html?page=shop'">🛍 Магазин</div>
                    <div class="profile-dropdown-divider"></div>
                    <div class="profile-dropdown-item" onclick="logout()" style="color:#ef4444;">🚪 Выйти</div>
                </div>
            </div>
        </div>
        <button class="nav-btn" onclick="window.location.href='/player'">📱 Игрок</button>
    </div>

    <!-- ВЫБОР ИГРЫ -->
    <div id="game-select" class="glass-card">
        <div class="logo-title">ИГРИЩЕ</div>
        <div class="subtitle">игра для компании</div>
        <div class="tier-slider" id="tierSlider">
            <div class="tier-slider-bg"></div>
            <div class="tier-tab active" onclick="switchTier('free')">Бесплатные</div>
            <div class="tier-tab" onclick="switchTier('premium')">👑 Премиум</div>
        </div>
        <div class="section-title">Выбери игру:</div>
        <div class="games-grid" id="gamesList"><div class="empty-state">Загрузка игр...</div></div>
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" class="glass-card hidden">
        <div class="logo-title" id="lobbyGameName"></div>
        <div class="center"><div class="room-code" id="roomCode">----</div></div>
        <p class="center" style="margin-top:15px;opacity:0.7;">Заходи на <span class="highlight" id="serverUrl">...</span></p>
        <div class="players-grid" id="playersList"><div class="empty-state">Ожидаем игроков...</div></div>
    </div>

</div>

<!-- КНОПКА СОЗДАТЬ КОМНАТУ (выбор игры) -->
<div class="bottom-bar" id="bottomCreate">
    <button class="btn" id="createRoomBtn" disabled onclick="createRoom()">🚀 СОЗДАТЬ КОМНАТУ</button>
</div>

<!-- КНОПКА НАЧАТЬ ИГРУ (лобби) -->
<div class="bottom-bar hidden" id="bottomStart">
    <button class="btn" id="startBtn" disabled onclick="startGame()">🎮 НАЧАТЬ ИГРУ</button>
    <button class="btn btn-secondary" onclick="resetToMenu()">← Выбрать другую игру</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user') || '{}');
const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');
document.getElementById('profileAvatar').textContent = equipped.avatar || (user.username?.[0] || '👤');
document.getElementById('profileText').textContent = user.username || 'Гость';

let selectedGame = null, roomCode = null, lobbyInterval = null, lastPlayerCount = 0, currentTier = 'free';

function loadGames() {
    fetch('/api/games').then(r => r.json()).then(games => {
        const grid = document.getElementById('gamesList');
        let filtered = Object.entries(games).filter(([id, game]) => {
            if (currentTier === 'premium' && game.tier !== 'premium') return false;
            if (currentTier === 'free' && game.tier === 'premium' && !isPremium()) return false;
            return true;
        });
        grid.innerHTML = filtered.map(([id, game]) => `<div class="game-card" data-game="${id}" onclick="selectGame('${id}')"><span class="game-icon-emoji">${game.icon||'🎮'}</span><div class="game-name" style="color:${game.color||'#7c3aed'}">${game.name}</div><div class="game-desc">${game.description||''}</div><div class="game-badge">${game.questions_count||'?'} шт.</div></div>`).join('');
    });
}

function switchTier(tier) {
    if (currentTier === tier) return;
    currentTier = tier;
    document.getElementById('tierSlider').classList.toggle('premium', tier === 'premium');
    document.querySelectorAll('.tier-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tier-tab:${tier === 'premium' ? 'last-child' : 'first-child'}`).classList.add('active');
    loadGames();
}

function selectGame(id) {
    selectedGame = id;
    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`[data-game="${id}"]`)?.classList.add('selected');
    document.getElementById('createRoomBtn').disabled = false;
}

function createRoom() {
    if (!selectedGame) return;
    fetch('/api/create?game=' + selectedGame)
    .then(r => r.json()).then(data => {
        if (data.error) { alert(data.error); return; }
        roomCode = data.code;
        document.getElementById('game-select').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('bottomCreate').classList.add('hidden');
        document.getElementById('bottomStart').classList.remove('hidden');
        document.getElementById('lobbyGameName').textContent = data.game.name;
        document.getElementById('roomCode').textContent = roomCode;
        document.getElementById('serverUrl').textContent = window.location.host + '/player';
        preloadLobbyMusic(); playLobbyMusic();
        lastPlayerCount = 0; updateLobby();
        lobbyInterval = setInterval(updateLobby, 2000);
    });
}

function updateLobby() {
    if (!roomCode) return;
    fetch('/api/state/' + roomCode).then(r => r.json()).then(data => {
        if (data.error) return;
        const players = data.players || {};
        const count = Object.keys(players).length;
        if (count > lastPlayerCount && lastPlayerCount > 0) playPlayerJoin();
        lastPlayerCount = count;
        const emojis = ['🦊','🐼','🐨','🦁','🐸','🦄','🐙','🦋'];
        document.getElementById('playersList').innerHTML = count === 0 ? '<div class="empty-state">Ожидаем игроков...</div>' : Object.entries(players).map(([id,p],i) => `<div class="player-card"><span>${emojis[i%8]}</span> ${p.name}</div>`).join('');
        document.getElementById('startBtn').disabled = count === 0;
    });
}

function startGame() {
    playGameStart();
    fetch('/api/start', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode})})
    .then(r => r.json()).then(data => {
        if (data.error) return;
        setTimeout(() => {
            fetch('/api/state/' + roomCode).then(r => r.json()).then(fullData => {
                clearInterval(lobbyInterval);
                redirectToGame(fullData);
            });
        }, 500);
    });
}

function redirectToGame(data) {
    const pages = {
        'quiz': '/frontend/tv_quiz.html',
        'truth_dare': '/frontend/tv_truth_dare.html',
        'kto_blizhe': '/frontend/tv_kto_blizhe.html',
        'mafia': '/frontend/tv_mafia.html'
    };
    const url = pages[data.game_type];
    if (url) {
        window.location.href = url + '?code=' + roomCode;
    }
}

function resetToMenu() {
    stopLobbyMusic(); clearInterval(lobbyInterval);
    if (roomCode) fetch('/api/reset', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode})});
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('bottomStart').classList.add('hidden');
    document.getElementById('bottomCreate').classList.remove('hidden');
    document.getElementById('game-select').classList.remove('hidden');
    document.getElementById('createRoomBtn').disabled = true;
    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
    selectedGame = null; roomCode = null;
}

function isPremium() { return JSON.parse(localStorage.getItem('premium')||'{"active":false}').active; }
function logout() { localStorage.clear(); window.location.href = '/'; }

// Звуки
let lobbyAudioCtx=null,lobbySource=null,lobbyBuffer=null;
async function preloadLobbyMusic(){try{if(!lobbyAudioCtx)lobbyAudioCtx=new(window.AudioContext||window.webkitAudioContext)();if(!lobbyBuffer){const r=await fetch('/static/sounds/fon.mp3');lobbyBuffer=await lobbyAudioCtx.decodeAudioData(await r.arrayBuffer());}}catch(e){}}
function playLobbyMusic(){if(!lobbyBuffer){preloadLobbyMusic().then(()=>playLooped());return;}playLooped();}
function playLooped(){if(!lobbyBuffer||!lobbyAudioCtx)return;stopLobbyMusic();lobbySource=lobbyAudioCtx.createBufferSource();lobbySource.buffer=lobbyBuffer;lobbySource.loop=true;lobbyGain=lobbyAudioCtx.createGain();lobbyGain.gain.value=0.3;lobbySource.connect(lobbyGain);lobbyGain.connect(lobbyAudioCtx.destination);lobbySource.start(0);}
function stopLobbyMusic(){if(lobbySource){try{lobbySource.stop(0);}catch(e){}lobbySource=null;}}
function playPlayerJoin(){try{new Audio('/static/sounds/connection.mp3').play().catch(()=>{});}catch(e){}}
function playGameStart(){stopLobbyMusic();try{new Audio('/static/sounds/fon.mp3').play().catch(()=>{});}catch(e){}}

loadGames();
</script>
</body>
</html>
