<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🕵️ Мафия — Игрок</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a14; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 30px 20px; max-width: 380px; width: 100%; text-align: center; }
        .role-icon { font-size: 80px; display: block; margin-bottom: 15px; }
        .role-name { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .role-desc { font-size: 14px; opacity: 0.6; margin-bottom: 20px; }
        .btn {
            width: 100%; padding: 14px; font-family: 'Rubik', sans-serif; font-weight: 800;
            font-size: 18px; border: none; border-radius: 30px; cursor: pointer; color: white;
            background: linear-gradient(135deg, #e94560, #c23152); margin-top: 10px; transition: 0.3s;
        }
        .btn:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        .warning { font-size: 12px; opacity: 0.5; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card" id="screen">
    <!-- РОЛЬ -->
    <div id="roleScreen" class="hidden">
        <span class="role-icon" id="roleIcon"></span>
        <div class="role-name" id="roleName"></div>
        <div class="role-desc" id="roleDesc"></div>
        <button class="btn" onclick="hideRole()">👁 Спрятать</button>
        <div class="warning">Никому не показывай экран!</div>
    </div>

    <!-- СКРЫТО -->
    <div id="hiddenScreen">
        <div style="font-size:60px;">🤫</div>
        <div style="margin:10px 0;">Твоя роль скрыта<br>Покажи когда спросят</div>
        <button class="btn" onclick="showRole()">👁 Показать роль</button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const roomCode = params.get('code') || '';
const playerId = params.get('player') || '';

function loadRole() {
    fetch('/api/state/' + roomCode)
        .then(r => r.json())
        .then(data => {
            if (data.error) return;
            fetch('/api/mafia/role?code=' + roomCode + '&player=' + playerId)
                .then(r => r.json())
                .then(roleData => {
                    document.getElementById('roleIcon').textContent = roleData.icon;
                    document.getElementById('roleName').textContent = roleData.name;
                    document.getElementById('roleDesc').textContent = roleData.description;
                    document.getElementById('roleScreen').classList.remove('hidden');
                    document.getElementById('hiddenScreen').classList.add('hidden');
                });
        });
}

function hideRole() {
    document.getElementById('roleScreen').classList.add('hidden');
    document.getElementById('hiddenScreen').classList.remove('hidden');
}

function showRole() {
    document.getElementById('roleScreen').classList.remove('hidden');
    document.getElementById('hiddenScreen').classList.add('hidden');
}

loadRole();
</script>
</body>
</html>
