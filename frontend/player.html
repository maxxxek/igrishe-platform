<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📱 ИГРИЩЕ — Игрок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ededed; --card-bg: rgba(255,255,255,0.55); --card-border: rgba(255,255,255,0.5);
            --text: #111; --accent: #7c3aed; --accent2: #f472b6; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Rubik', sans-serif; font-weight: 500;
            background: var(--bg); min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center; padding: 16px;
        }
        .container { width: 100%; max-width: 400px; }

        .nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .nav-logo {
            width: 45px; height: 45px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center;
            overflow: visible; border: 3px solid #e3e3e3;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .nav-logo:hover { transform: scale(1.1); }
        .nav-logo img { width: 130%; height: 130%; object-fit: contain; margin-top: -8px; }
        .profile-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 30px;
            padding: 8px 16px; cursor: pointer; transition: 0.3s;
        }
        .profile-badge:hover { background: rgba(255,255,255,0.8); }
        .profile-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #a53cff, #3fffd2);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: white; font-weight: 700;
        }
        .profile-text { font-weight: 700; color: var(--text); font-size: 14px; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 2px solid var(--card-border); border-radius: 24px;
            padding: 25px 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        .logo-title {
            font-size: 36px; font-weight: 900; text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 20px;
        }
        .input-group { margin-bottom: 14px; }
        .input-label { font-size: 12px; font-weight: 700; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .glass-input {
            width: 100%; padding: 14px 16px; font-family: 'Rubik', sans-serif;
            font-weight: 600; font-size: 18px;
            background: rgba(255,255,255,0.6); border: 2px solid rgba(255,255,255,0.6);
            border-radius: 14px; color: var(--text); text-align: center; outline: none;
        }
        .glass-input:focus { border-color: var(--accent); }
        #codeInput { letter-spacing: 8px; text-transform: uppercase; font-size: 22px; }
        .btn {
            width: 100%; padding: 14px; font-family: 'Rubik', sans-serif;
            font-weight: 800; font-size: 18px; border: none; border-radius: 50px;
            cursor: pointer; color: white; margin-top: 8px; transition: 0.3s;
            background: linear-gradient(135deg, var(--accent), #a855f7, var(--accent2));
        }
        .btn:active { transform: scale(0.96); }
        .error-msg { color: var(--red); text-align: center; margin-top: 10px; font-size: 13px; min-height: 18px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">

    <!-- ШАПКА -->
    <div class="nav">
        <div class="nav-logo" onclick="window.location.href='/'">
            <img src="/static/icons/logo.png" alt="ИГРИЩЕ" onerror="this.innerHTML='🎮'">
        </div>
        <div class="profile-badge" onclick="window.location.href='/frontend/dashboard.html?page=profile'">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <span class="profile-text" id="profileText">Гость</span>
        </div>
    </div>

    <!-- ВХОД -->
    <div id="joinScreen">
        <div class="glass-card">
            <div class="logo-title">ИГРИЩЕ</div>
            <div class="input-group"><div class="input-label">Имя</div><input class="glass-input" id="nameInput" placeholder="Твоё имя" maxlength="15"></div>
            <div class="input-group"><div class="input-label">Код</div><input class="glass-input" id="codeInput" placeholder="ABCD" maxlength="4"></div>
            <button class="btn" onclick="joinGame()">ВОЙТИ</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user') || '{}');
const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');
document.getElementById('profileAvatar').textContent = equipped.avatar || (user.username?.[0] || '👤');
document.getElementById('profileText').textContent = user.username || 'Гость';

function joinGame() {
    const name = document.getElementById('nameInput').value.trim() || 'Игрок';
    const code = document.getElementById('codeInput').value.toUpperCase();
    const err = document.getElementById('errorMsg'); err.textContent = '';
    if (code.length !== 4) { err.textContent = 'Нужен 4-буквенный код'; return; }
    
    // Собираем аватарку
    let avatarUrl = '';
    if (equipped.avatar && equipped.avatar.startsWith('/static/avatars/')) {
        avatarUrl = equipped.avatar;
    }
    
    fetch('/api/join', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name, code, avatar_url: avatarUrl})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { err.textContent = data.error; return; }
        redirectToGame(data.game_type, code, data.player_id);
    })
    .catch(() => { err.textContent = 'Сервер не отвечает'; });
}

function redirectToGame(gameType, code, playerId) {
    const pages = {
        'quiz': '/frontend/player_quiz.html',
        'truth_dare': '/frontend/player_truth_dare.html',
        'kto_blizhe': '/frontend/player_kto_blizhe.html',
        'mafia': '/frontend/player_mafia.html'
    };
    const url = pages[gameType];
    if (url) {
        window.location.href = url + '?code=' + code + '&player=' + playerId;
    }
}

document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('codeInput').focus(); });
document.getElementById('nameInput').focus();
</script>
</body>
</html>
