<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ИГРИЩЕ — Игры для компании</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ededed;
    font-family: 'Rubik', sans-serif;
    overflow-x: hidden;
    color: #111;
  }

  html { scroll-behavior: smooth; }

  section {
    opacity: 0;
    transform: translateY(6vh);
    transition: 1s ease;
  }

  section.show { opacity: 1; transform: translateY(0); }

  .container { width: 100%; max-width: 100%; margin: auto; padding: 0; }

  /* ----- НАВИГАЦИЯ ----- */
  .nav {
    width: 100%; height: 18vh; min-height: 70px;
    background: rgba(255, 255, 255, 0.4);
    border: 4px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(18px);
    border-radius: 0 0 3vh 3vh;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw; position: sticky; top: 0; z-index: 9999;
  }

  .logo {
    width: 20vh; height: 20vh; min-width: 70px; min-height: 70px;
    border-radius: 50%; background: white;
    display: flex; align-items: center; justify-content: center;
    overflow: visible; border: 0.5vh solid #e3e3e3;
    margin-top: 6vh; cursor: pointer; transition: 0.3s;
    box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.1);
  }

  .logo:hover { transform: scale(1.05); box-shadow: 0 1vh 3vh rgba(0,0,0,0.2); }
  .logo img { width: 60%; height: 60%; object-fit: contain; }

  .nav-buttons {
    display: flex; align-items: center;
    background: linear-gradient(90deg, #ff5b7f, #ff2d55, #cc39ff);
    padding: 2vh 4vw; border-radius: 5vh; gap: 6vw;
    cursor: pointer; transition: 0.3s;
    box-shadow: 0 0.5vh 2vh rgba(255, 45, 85, 0.3);
  }

  .nav-buttons:hover { transform: scale(1.05); box-shadow: 0 1vh 4vh rgba(255, 45, 85, 0.5); }

  .nav-icon {
    width: 8vh; height: 8vh; min-width: 40px; min-height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.3s; position: relative;
  }

  .nav-icon img { width: 100%; height: 100%; object-fit: contain; }
  .nav-icon:hover { transform: scale(1.15); }

  .nav-icon::after {
    
    content: attr(data-tooltip);
    position: absolute;
    bottom: -5vh;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 0.8vh 2vw;
    border-radius: 2vh;
    font-size: 1.8vh;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    font-family: 'Rubik', sans-serif;
    font-weight: 500;
    display: none;
    
  }
  
  .nav-icon[data-tooltip]:hover::after {
    display: block;  /* ← показываем только если есть атрибут */
    opacity: 1;
    bottom: -6vh;
  }
/* 
  .nav-icon:hover::after {
     opacity: 1;
     bottom: -6vh;
  }
*/
  .nav-divider {
    width: 0.3vh; height: 6vh;
    background: white; border-radius: 1vh;
  }



  /* ----- Плашка профиля ----- */
  .profile-badge {
    display: flex;
    align-items: center;
    gap: 1.5vw;
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 5vh;
    padding: 1.5vh 2.5vw;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0.5vh 2vh rgba(0,0,0,0.08);
  }

  .profile-badge:hover {
    background: rgba(255, 255, 255, 0.7);
    transform: scale(1.05);
    box-shadow: 0 1vh 3vh rgba(0,0,0,0.15);
  }

  .profile-avatar {
    width: 6vh;
    height: 6vh;
    min-width: 35px;
    min-height: 35px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a53cff, #3fffd2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3vh;
    color: white;
    overflow: hidden;
  }

  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .profile-text {
    font-size: clamp(1.8vh, 2.5vw, 2.5vh);
    font-weight: 600;
    color: #333;
    white-space: nowrap;
  }

  .profile-arrow {
    font-size: 2vh;
    color: #888;
    transition: 0.3s;
  }

  .profile-badge:hover .profile-arrow {
    transform: rotate(180deg);
  }

/* Выпадающее меню */
  .profile-dropdown {
    position: absolute;
    top: 110%;
    right: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 2vh;
    padding: 1.5vh 0;
    min-width: 22vw;
    max-width: 280px;
    box-shadow: 0 2vh 5vh rgba(0,0,0,0.15);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-1vh);
    transition: 0.3s;
    z-index: 100;
    transition-delay: 0.2s; 
  }

  .profile-badge:hover .profile-dropdown {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
    
  }

  .profile-dropdown-item {
    padding: 1.5vh 2.5vw;
    cursor: pointer;
    font-size: clamp(1.6vh, 2vw, 2vh);
    font-weight: 500;
    color: #333;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 1vw;
  }

  .profile-dropdown-item:hover {
    background: rgba(124, 58, 237, 0.08);
    color: #7c3aed;
  }

  .profile-dropdown-divider {
    height: 1px;
    background: #e0e0e0;
    margin: 0.5vh 0;
  }
  .profile-dropdown::before {
    content: '';
    position: absolute;
    top: -3vh;
    left: 0;
    width: 100%;
    height: 3vh;
    background: transparent;
}

/* Адаптив */
  @media (max-width: 768px) {
    .profile-text {
        display: none;
    }
    
    .profile-badge {
        padding: 1vh 2vw;
        gap: 1vw;
    }
    
    .profile-avatar {
        width: 5vh;
        height: 5vh;
        min-width: 30px;
        min-height: 30px;
    }
    
    .profile-dropdown {
        min-width: 35vw;
    }
  }
  /* ----- HERO ----- */
  .hero {
    min-height: 88vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center; position: relative;
  }

  .emoji {
    position: absolute;
    font-size: clamp(4vh, 8vw, 12vh);
    animation: pulse 4s infinite ease-in-out;
    user-select: none; pointer-events: none;
  }

  .emoji:nth-child(1) { top: 13%; left: 8%; }
  .emoji:nth-child(2) { top: 11%; left: 30%; animation-delay: 1s; }
  .emoji:nth-child(3) { top: 8%; right: 28%; animation-delay: 2s; }
  .emoji:nth-child(4) { top: 15%; right: 8%; animation-delay: 1.5s; }
  .emoji:nth-child(5) { bottom: 22%; left: 10%; animation-delay: 0.5s; }
  .emoji:nth-child(6) { bottom: 18%; left: 50%; animation-delay: 2.5s; }
  .emoji:nth-child(7) { bottom: 17%; right: 10%; animation-delay: 1.2s; }

  @keyframes pulse {
    0% { transform: scale(1) translateY(0px); }
    50% { transform: scale(1.12) translateY(-1.5vh); }
    100% { transform: scale(1) translateY(0px); }
  }

  .gradient-oval {
    position: absolute; width: 60vw; height: 30vh; min-height: 100px;
    background: linear-gradient(90deg, #4de9e9, #7d7dff, #ff00ff);
    top: 45%; border-radius: 999px; transform: translateY(-50%);
    filter: blur(0px); opacity: 0.85;
  }

  .title {
    position: relative; z-index: 2;
    font-size: clamp(11vw, 12vw, 14vw); font-weight: 800;
    color: #111; line-height: 0.9; text-transform: uppercase;
    letter-spacing: -0.5vw; text-align: center; margin-top: -8vh;
  }

  .scroll-line {
    width: 85%; height: 1.2vh; background: #d0d0d0;
    border-radius: 999px; margin: 4vh auto;
  }

  /* ----- STEPS ----- */
  .steps-section { padding: 8vh 0; }

  .flags {
    display: flex; justify-content: space-around;
    font-size: clamp(5vh, 10vw, 10vh); margin-bottom: 3vh;
  }

  .steps-box {
    background: rgba(255, 255, 255, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 4vh; backdrop-filter: blur(16px);
    padding: 4vh 3vw;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 3vw; margin: 0 4vw;
  }

  .step-card {
    min-height: 25vh; border-radius: 4vh;
    background: rgba(255, 255, 255, 0.35);
    border: 2px solid rgba(255, 255, 255, 0.7);
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 3vh 2vw;
    font-size: clamp(2.5vh, 4vw, 5vh); line-height: 1.3;
    font-weight: 600; transition: 0.3s;
  }

  .step-card:hover { background: rgba(255, 255, 255, 0.6); transform: translateY(-1vh); }

  .gradient-title {
    width: fit-content; margin: 6vh auto;
    background: linear-gradient(90deg, #ff3d2e, #cc39ff);
    color: white; padding: 2vh 6vw; border-radius: 999px;
    font-size: clamp(3vh, 6vw, 8vh); font-weight: 800; text-align: center;
  }

  /* ----- DEVICES ----- */
  .devices-box {
    background: rgba(255, 255, 255, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 5vh; backdrop-filter: blur(18px);
    padding: 4vh 4vw; margin: 1vh 4vw;
  }

  .devices-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 4vw;
  }

  .device-card { display: flex; flex-direction: column; align-items: center; }

  .device-inner {
    width: 100%; height: 40vh; min-height: 250px;
    border-radius: 5vh; display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: 0.3s;
    position: relative; overflow: hidden;
  }

  .device-inner:hover { transform: scale(1.02); }

  .phone-bg {
    background: linear-gradient(135deg, #a53cff, #3fffd2);
    box-shadow: 0 2vh 6vh rgba(165, 60, 255, 0.3);
  }
  .phone-bg:hover { box-shadow: 0 3vh 10vh rgba(165, 60, 255, 0.5); }

  .laptop-bg {
    background: linear-gradient(135deg, #c53cff, #ff4370);
    box-shadow: 0 2vh 6vh rgba(197, 60, 255, 0.3);
  }
  .laptop-bg:hover { box-shadow: 0 3vh 10vh rgba(197, 60, 255, 0.5); }

  .device-inner img {
    width: 90%; height: 80%; object-fit: contain;
    transition: 0.3s; filter: brightness(0) invert(1);
  }

  .device-inner:hover img { transform: scale(1.1); }

  .device-badge {
    position: absolute; top: 2vh; right: 2vw;
    background: rgba(255,255,255,0.9); color: #111;
    padding: 1vh 2vw; border-radius: 3vh;
    font-size: clamp(1.5vh, 2.5vw, 2.5vh); font-weight: 700;
  }

  .device-button {
    margin-top: 3vh; padding: 2vh 5vw; border-radius: 999px;
    color: white; font-size: clamp(2.5vh, 4vw, 4.5vh);
    font-weight: 700; cursor: pointer; border: none;
    font-family: 'Rubik', sans-serif; transition: 0.3s;
    width: 80%; text-align: center;
  }

  .device-button:hover { transform: scale(1.05); }
  .device-button:active { transform: scale(0.95); }

  .phone-button {
    background: linear-gradient(90deg, #a53cff, #7a4dff);
    box-shadow: 0 1vh 3vh rgba(165, 60, 255, 0.4);
  }
  .phone-button:hover { box-shadow: 0 2vh 5vh rgba(165, 60, 255, 0.6); }

  .laptop-button {
    background: linear-gradient(90deg, #ff3f67, #ff4b91);
    box-shadow: 0 1vh 3vh rgba(255, 63, 103, 0.4);
  }
  .laptop-button:hover { box-shadow: 0 2vh 5vh rgba(255, 63, 103, 0.6); }

  /* ----- FOOTER ----- */
  .footer {
    margin-top: 12vh; background: #111;
    border-radius: 5vh 5vh 0 0; min-height: 25vh;
    color: white; display: flex; align-items: center;
    justify-content: space-between; padding: 4vh 6vw;
    flex-wrap: wrap; gap: 3vh;
  }

  .footer-text { font-size: clamp(3vh, 5vw, 6vh); font-weight: 800; letter-spacing: 0.3vw; }
  .footer-emoji { font-size: clamp(5vh, 10vw, 12vh); animation: pulse 4s infinite ease-in-out; }

  .footer-logo {
    width: 12vh; height: 12vh; min-width: 60px; min-height: 60px;
    border-radius: 50%; background: white; display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; transition: 0.3s;
  }

  .footer-logo:hover { transform: scale(1.1); box-shadow: 0 0 3vh rgba(255,255,255,0.3); }
  .footer-logo img { width: 60%; height: 60%; object-fit: contain; }

  /* ----- МОДАЛЬНОЕ ОКНО ----- */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    z-index: 10000; display: flex; align-items: center;
    justify-content: center; opacity: 0; pointer-events: none;
    transition: 0.4s;
  }

  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: white; border-radius: 4vh; padding: 5vh 6vw;
    text-align: center; max-width: 90vw; width: 500px;
    box-shadow: 0 5vh 15vh rgba(0,0,0,0.3); position: relative;
    transform: translateY(3vh); transition: 0.3s;
  }

  .modal-overlay.active .modal { transform: translateY(0); }

  .modal-close {
    position: absolute; top: 2vh; right: 3vw;
    font-size: 4vh; cursor: pointer; background: none;
    border: none; width: 5vh; height: 5vh; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s; font-family: 'Rubik', sans-serif; color: #888;
  }

  .modal-close:hover { background: #f0f0f0; color: #111; }

  .modal-icon { width: 10vh; height: 10vh; margin: 0 auto 2vh; }
  .modal-icon img { width: 100%; height: 100%; object-fit: contain; }

  .modal-title { font-size: clamp(2.5vh, 5vw, 4vh); font-weight: 800; margin-bottom: 1vh; }
  .modal-subtitle { color: #666; font-size: clamp(1.8vh, 3vw, 2.5vh); margin-bottom: 3vh; }

  .room-code {
    background: #f5f5f5; border-radius: 2vh; padding: 2vh 4vw;
    font-size: clamp(4vh, 7vw, 7vh); font-weight: 900;
    letter-spacing: 0.5vw; margin-bottom: 3vh;
    user-select: all; cursor: pointer; transition: 0.3s;
    border: 0.3vh dashed #ddd;
  }

  .room-code:hover { background: #ebebeb; border-color: #bbb; }

  .modal-buttons { display: flex; gap: 2vw; justify-content: center; flex-wrap: wrap; }

  .modal-btn {
    padding: 1.8vh 3.5vw; border-radius: 999px; border: none;
    font-family: 'Rubik', sans-serif; font-weight: 700;
    font-size: clamp(2vh, 3vw, 2.8vh); cursor: pointer;
    transition: 0.3s; color: white;
  }

  .modal-btn:hover { transform: scale(1.05); }
  .modal-btn:active { transform: scale(0.95); }

  .btn-tv { background: linear-gradient(90deg, #ff3f67, #ff4b91); }
  .btn-player { background: linear-gradient(90deg, #a53cff, #7a4dff); }
  .btn-copy { background: #333; }

  .copied-toast {
    position: fixed; bottom: 5vh; left: 50%;
    transform: translateX(-50%) translateY(150%);
    background: #333; color: white; padding: 1.5vh 4vw;
    border-radius: 999px; font-family: 'Rubik', sans-serif;
    font-weight: 600; font-size: 2vh; z-index: 11000;
    transition: 0.4s;
  }

  .copied-toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .steps-box { grid-template-columns: 1fr; }
    .devices-grid { grid-template-columns: 1fr; }
    .device-inner { height: 25vh; min-height: 180px; }
  }
</style>
</head>

<body>

<div class="container">

  <!-- НАВИГАЦИЯ -->
  <nav class="nav">
    <!-- ЛОГОТИП -->
    <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <img src="/static/icons/logo.png" alt="ИГРИЩЕ" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:5vh>🎮</span>'">
    </div>

    <!-- ПЛАШКА ПРОФИЛЯ -->
    <div class="profile-badge" id="profileBadge">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <span class="profile-text" id="profileText">Войти</span>
        <span class="profile-arrow">▼</span>
        
        <div class="profile-dropdown" id="profileDropdown">
            <div class="profile-dropdown-item" onclick="goToPage('login')">🔑 Войти</div>
            <div class="profile-dropdown-item" onclick="goToPage('register')">✨ Регистрация</div>
            <div class="profile-dropdown-divider"></div>
            <div class="profile-dropdown-item" onclick="goToPage('profile')">👤 Профиль</div>
            <div class="profile-dropdown-item" onclick="goToPage('wallet')">💰 Кошелёк</div>
            <div class="profile-dropdown-item" onclick="goToPage('shop')">🛍 Магазин</div>
            <div class="profile-dropdown-divider"></div>
            <div class="profile-dropdown-item" id="logoutButton" onclick="logout()" style="color:#ef4444; display:none;">🚪 Выйти</div>
        </div>
    </div>

    <!-- КНОПКИ ТВ/ТЕЛЕФОН -->
    <div class="nav-buttons">
        <div class="nav-icon" data-tooltip="Игрок (телефон)" onclick="createAndGo('player')">
            <img src="/static/icons/white_phone.png" alt="Телефон" onerror="this.parentElement.textContent='📱'">
        </div>
        <div class="nav-divider"></div>
        <div class="nav-icon" data-tooltip="ТВ (ноутбук)" onclick="createAndGo('tv')">
            <img src="/static/icons/white_pc.png" alt="Компьютер" onerror="this.parentElement.textContent='💻'">
        </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero show">
    <div class="emoji">🕹️</div>
    <div class="emoji">😂</div>
    <div class="emoji">🔥</div>
    <div class="emoji">🎵</div>
    <div class="emoji">😎</div>
    <div class="emoji">🎪</div>
    <div class="emoji">🥳</div>
    <div class="gradient-oval"></div>
    <h1 class="title">ИГРИЩЕ</h1>
  </section>

  <div class="scroll-line"></div>

  <!-- ШАГИ -->
  <section class="steps-section">
    <div class="flags"><span>🚩</span><span>🚩</span><span>🚩</span></div>
    <div class="steps-box">
      <div class="step-card">Запускаете<br>на ноутбуке<br>сервер</div>
      <div class="step-card">Вводите с<br>экрана код<br>в телефоне</div>
      <div class="step-card">Веселитесь!</div>
    </div>
    <div class="gradient-title">Как зайти?</div>
  </section>

  <!-- УСТРОЙСТВА -->
  <section>
    <div class="devices-box">
      <div class="devices-grid">
        <div class="device-card">
          <div class="device-inner phone-bg" onclick="createAndGo('player')">
            <img src="/static/icons/white_phone.png" alt="Телефон" onerror="this.parentElement.innerHTML='<span style=font-size:15vh>📱</span>'">
            <span class="device-badge">Игрок</span>
          </div>
          <button class="device-button phone-button" onclick="createAndGo('player')">📱 Телефон</button>
        </div>
        <div class="device-card">
          <div class="device-inner laptop-bg" onclick="createAndGo('tv')">
            <img src="/static/icons/white_pc.png" alt="Компьютер" onerror="this.parentElement.innerHTML='<span style=font-size:15vh>💻</span>'">
            <span class="device-badge">ТВ / Экран</span>
          </div>
          <button class="device-button laptop-button" onclick="createAndGo('tv')">💻 Компьютер</button>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-text">КОНЕЦ САЙТА)</div>
    <div class="footer-emoji">😊</div>
    <div class="footer-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Наверх">
      <img src="/static/icons/logo.png" alt="ИГРИЩЕ" onerror="this.parentElement.innerHTML='<span style=font-size:5vh>🎮</span>'">
    </div>
  </footer>
</div>

<script src="/frontend/js/wallet.js"></script>

<script>

function goToPage(page) {
    const pages = {
        'login': '/frontend/login.html',
        'register': '/frontend/register.html',
        'profile': '/frontend/dashboard.html?page=profile',
        'wallet': '/frontend/dashboard.html?page=shop',
        'shop': '/frontend/dashboard.html?page=wallet'
    };
    if (pages[page]) {
        window.location.href = pages[page];
    }
}


function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    localStorage.removeItem('wallet');
    updateProfileUI();
    window.location.href = '/';
}


// Обновляем при загрузке
updateProfileUI();

async function createAndGo(mode) {
    if (mode === 'tv') {
        window.location.href = '/tv';
    } else {
        window.location.href = '/player';
    }
}



function updateProfileUI() {
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');
    const avatarEl = document.getElementById('profileAvatar');
    const textEl = document.getElementById('profileText');
    const logoutBtn = document.getElementById('logoutButton');
    const loginItem = document.querySelector('.profile-dropdown-item[onclick*="login"]');
    const registerItem = document.querySelector('.profile-dropdown-item[onclick*="register"]');
    
    if (!avatarEl) return;
    
    // Аватар
    if (equipped.avatar && equipped.avatar.startsWith('/static/avatars/')) {
        avatarEl.innerHTML = `<img src="${equipped.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else if (equipped.avatar && equipped.avatar.length <= 4) {
        avatarEl.textContent = equipped.avatar;
    } else {
        avatarEl.textContent = user.username ? user.username[0].toUpperCase() : '👤';
    }
    
    if (token && user.username) {
        // Авторизован
        if (textEl) textEl.textContent = user.username;
        if (logoutBtn) logoutBtn.style.display = 'flex';
        if (loginItem) loginItem.style.display = 'none';
        if (registerItem) registerItem.style.display = 'none';
    } else {
        // Гость
        if (textEl) textEl.textContent = 'Войти';
        if (logoutBtn) logoutBtn.style.display = 'none';
        if (loginItem) loginItem.style.display = 'flex';
        if (registerItem) registerItem.style.display = 'flex';
    }
}

// Анимация секций
const sections = document.querySelectorAll('section');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('show');
    });
}, { threshold: 0.15 });
sections.forEach(section => observer.observe(section));
document.querySelector('.hero').classList.add('show');
</script>
<script src="/frontend/js/avatar.js"></script>

</body>
</html>
