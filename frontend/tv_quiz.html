<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Квиз — ТВ</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a14; --card: rgba(255,255,255,0.03);
            --text: #fff; --accent: #7c3aed; --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rubik', sans-serif; background: var(--bg);
            color: var(--text); min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 800px; }
        .card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px; padding: 30px; text-align: center;
        }
        .title { font-size: 32px; font-weight: 900; margin-bottom: 5px; }
        .counter { font-size: 14px; opacity: 0.5; margin-bottom: 20px; }
        .question-text { font-size: 30px; font-weight: 800; margin: 20px 0; line-height: 1.4; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; margin: 0 auto; }
        .answer-display {
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 16px; font-size: 20px; font-weight: 700;
        }
        .timer { font-size: 56px; font-weight: 900; color: var(--orange); margin: 15px 0; }
        .timer.warning { color: var(--red); }
        
        .players-status { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
        .player-chip {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05); padding: 8px 16px;
            border-radius: 20px; font-weight: 600; font-size: 14px;
        }
        .player-chip.answered { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.green { background: var(--green); }
        .dot.gray { background: rgba(255,255,255,0.2); }
        .answered-count { font-size: 13px; opacity: 0.5; margin-top: 8px; }

        .scores-list { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
        .score-card {
            background: rgba(255,255,255,0.05); padding: 10px 18px;
            border-radius: 12px; text-align: center; font-weight: 700; font-size: 14px;
        }
        .score-card.top { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3); }

        .btn {
            padding: 14px 40px; font-family: 'Rubik', sans-serif;
            font-weight: 800; font-size: 18px; border: none; border-radius: 30px;
            cursor: pointer; color: white; margin: 8px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.03); }
        .btn-outline { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">

    <!-- ИГРА -->
    <div class="card" id="screenGame">
        <div class="title" id="gameTitle">🎯 Квиз</div>
        <div class="counter" id="questionCounter"></div>
        <div class="question-text" id="questionText">Загрузка...</div>
        <div class="timer" id="timer"></div>
        <div class="answers-grid" id="answersDisplay"></div>
        <div class="answered-count" id="answeredCount"></div>
        <div class="players-status" id="playersStatus"></div>
        <div class="scores-list" id="scoresDisplay"></div>
    </div>

    <!-- ФИНАЛ -->
    <div class="card hidden" id="screenFinal">
        <div class="title">🏆 Игра окончена!</div>
        <div class="scores-list" id="finalScores"></div>
        <button class="btn" onclick="playAgain()">🔄 Сыграть ещё</button>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const roomCode = params.get('code') || '';
let updateInterval = null;

function updateScreen() {
    fetch('/api/state/' + roomCode)
        .then(r => r.json())
        .then(data => {
            if (data.error) return;
            
            if (data.state === 'finished') {
                document.getElementById('screenGame').classList.add('hidden');
                document.getElementById('screenFinal').classList.remove('hidden');
                const scores = data.scores || {};
                const players = data.players || {};
                const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
                document.getElementById('finalScores').innerHTML = sorted
                    .map(([id,s],i) => {
                        const medals = ['🥇','🥈','🥉'];
                        return `<div class="score-card ${i===0?'top':''}">${medals[i]||'🏅'} ${players[id]?.name||'?'}: ${s}</div>`;
                    }).join('');
                return;
            }
            
            const q = data.current_question;
            if (q) {
                document.getElementById('questionCounter').textContent = 
                    `Вопрос ${(data.question_index||0)+1}/${data.total_questions||0}`;
                document.getElementById('questionText').textContent = q.text;
                document.getElementById('answersDisplay').innerHTML = q.answers.map(a => 
                    `<div class="answer-display">${a}</div>`).join('');
            }
            
            const tLeft = data.question_time_left || 0;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = '⏱ ' + tLeft;
            timerEl.classList.toggle('warning', tLeft <= 5);
            
            const players = data.players || {};
            const answered = data.answered_players || [];
            document.getElementById('answeredCount').textContent = 
                `Ответили: ${answered.length}/${Object.keys(players).length}`;
            document.getElementById('playersStatus').innerHTML = Object.entries(players)
                .map(([id,p]) => {
                    const a = answered.includes(id);
                    return `<div class="player-chip ${a?'answered':''}">
                        <div class="dot ${a?'green':'gray'}"></div>${p.name}
                    </div>`;
                }).join('');
            
            const scores = data.scores || {};
            const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
            document.getElementById('scoresDisplay').innerHTML = sorted
                .map(([id,s],i) => `<div class="score-card ${i===0?'top':''}">${['🥇','🥈','🥉'][i]||'🏅'} ${players[id]?.name}: ${s}</div>`).join('');
        });
}

function playAgain() {
    fetch('/api/reset', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode})})
        .then(() => window.location.href = '/tv');
}

updateScreen();
updateInterval = setInterval(updateScreen, 1000);
</script>
</body>
</html>
