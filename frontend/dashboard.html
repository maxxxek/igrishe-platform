<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРИЩЕ — Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ededed; font-family: 'Rubik', sans-serif; color: #111; min-height: 100vh; }

        .nav {
            width: 100%; height: 10vh; min-height: 60px;
            background: rgba(255,255,255,0.4); border: 2px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(18px); border-radius: 0 0 3vh 3vh;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 3vw; position: sticky; top: 0; z-index: 999;
        }
        .nav-logo {
            width: 8vh; height: 8vh; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center;
            overflow: visible; border: 3px solid #e3e3e3; cursor: pointer;
            margin-top: 4vh; transition: 0.3s;
        }
        .nav-logo:hover { transform: scale(1.1); }
        .nav-logo img { width: 130%; height: 130%; object-fit: contain; margin-top: -2vh; }
        .nav-title { font-weight: 800; font-size: 20px; }
        .nav-back {
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3vh; padding: 1vh 3vw; font-weight: 700; cursor: pointer;
        }

        .layout {
            display: flex; gap: 20px; max-width: 900px; margin: 20px auto;
            padding: 0 15px;
        }

        /* БОКОВОЕ МЕНЮ — СЛЕВА */
        .side-menu {
            width: 180px; flex-shrink: 0;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(18px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 2vh;
            padding: 20px 15px; position: sticky; top: 15vh; height: fit-content;
        }
        .side-menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 12px; border-radius: 14px; cursor: pointer;
            font-weight: 700; font-size: 15px; transition: 0.2s; margin-bottom: 5px;
            color: #333;
        }
        .side-menu-item:hover { background: rgba(255,255,255,0.8); }
        .side-menu-item.active { background: rgba(124,58,237,0.1); color: #7c3aed; }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ */
        .main-content {
            flex: 1; max-width: 550px;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(18px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 3vh;
            padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .hidden { display: none !important; }
        .btn {
            width: 100%; padding: 14px; font-weight: 800; font-size: 16px;
            border: none; border-radius: 50px; cursor: pointer; color: white;
            margin-top: 10px; transition: 0.3s;
            background: linear-gradient(135deg, #7c3aed, #f472b6);
        }
        .btn:hover { transform: scale(1.02); }
        .btn-outline {
            background: rgba(255,255,255,0.5); color: #2d1b69;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .btn-danger { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; }

        .toast {
            position: fixed; bottom: 5vh; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 12px 24px;
            border-radius: 50px; font-weight: 600; font-size: 14px;
            z-index: 11000; opacity: 0; transition: 0.4s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        .stat-card {
            background: rgba(255,255,255,0.5); padding: 15px;
            border-radius: 14px; text-align: center;
        }
        .avatar-big {
            width: 15vh; height: 15vh; border-radius: 50%;
            background: linear-gradient(135deg, #a53cff, #3fffd2);
            display: flex; align-items: center; justify-content: center;
            font-size: 6vh; color: white; font-weight: 900;
            margin: 0 auto 15px; overflow: hidden;
        }
        .avatar-big img { width: 100%; height: 100%; object-fit: cover; }

        .upload-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; background: rgba(255,255,255,0.5);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 40px;
            cursor: pointer; font-weight: 700; font-size: 15px; margin: 10px 0;
        }
        .upload-btn:hover { background: rgba(255,255,255,0.8); }

        .shop-card {
            background: rgba(255,255,255,0.5); padding: 15px;
            border-radius: 14px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .shop-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .shop-card.owned { opacity: 0.6; border: 2px solid #22c55e; }
        .shop-card.equipped { border: 2px solid #7c3aed; }

        .premium-card {
            background: linear-gradient(135deg, #1a0533, #2d1b69);
            color: white; border-radius: 16px; padding: 16px; margin-bottom: 15px;
        }
        .premium-card .badge { color: #fbbf24; font-weight: 800; }
        .premium-card .features { font-size: 12px; opacity: 0.7; margin-top: 8px; }

        @media (max-width: 700px) {
            .layout { flex-direction: column; }
            .side-menu {
                width: 100%; display: flex; overflow-x: auto;
                position: static; padding: 10px; gap: 5px;
            }
            .side-menu-item { white-space: nowrap; margin-bottom: 0; }
            .main-content { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ШАПКА -->
    <nav class="nav">
        <div class="nav-logo" onclick="window.location.href='/'">
            <img src="/static/icons/logo.png" alt="ИГРИЩЕ" onerror="this.innerHTML='🎮'">
        </div>
        <div class="nav-title" id="navTitle">Профиль</div>
        <button class="nav-back" onclick="window.location.href='/'">← На главную</button>
    </nav>

    <!-- ОСНОВНАЯ ЧАСТЬ -->
    <div class="layout">
        
        <!-- МЕНЮ СЛЕВА -->
        <div class="side-menu">
            <div class="side-menu-item active" data-page="profile" onclick="switchPage('profile')">👤 Профиль</div>
            <div class="side-menu-item" data-page="shop" onclick="switchPage('shop')">🛍 Магазин</div>
            <div class="side-menu-item" data-page="wallet" onclick="switchPage('wallet')">💰 Кошелёк</div>
            <div class="side-menu-item" onclick="logout()" style="color:#ef4444;">🚪 Выйти</div>
        </div>

        <!-- КОНТЕНТ ПО ЦЕНТРУ -->
        <div class="main-content" id="mainContent"></div>

    </div>

    <div class="toast" id="toast"></div>

<script src="/frontend/js/wallet.js"></script>
<script>
let currentPage = 'profile';
const urlParams = new URLSearchParams(window.location.search);

function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.side-menu-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
    document.getElementById('navTitle').textContent = 
        page === 'profile' ? 'Профиль' : page === 'shop' ? 'Магазин' : 'Кошелёк';
    renderPage(page);
}

// ========== ПРОФИЛЬ ==========
function renderProfile() {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const wallet = JSON.parse(localStorage.getItem('wallet') || '{}');
    const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');
    const main = document.getElementById('mainContent');

    let avatarHTML = (user.username?.[0] || '?');
    if (equipped.avatar && equipped.avatar.startsWith('/static/avatars/')) {
        avatarHTML = `<img src="${equipped.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
    } else if (equipped.avatar && equipped.avatar.length <= 4) {
        avatarHTML = equipped.avatar;
    }

    main.innerHTML = `
        <div style="text-align:center;">
            <div class="avatar-big">${avatarHTML}</div>
            <label class="upload-btn">
                📷 Изменить фото
                <input type="file" accept="image/*" style="display:none;" onchange="uploadAvatar(this)">
            </label>
            <div style="font-size:24px;font-weight:900;">${user.username || 'Гость'}</div>
            <div style="color:#888;font-size:14px;">${user.email || ''}</div>
            <div style="display:inline-block;background:linear-gradient(90deg,#ff3d2e,#cc39ff);color:white;padding:1vh 3vw;border-radius:999px;font-size:14px;font-weight:700;margin:10px 0;">Уровень ${user.level || 1}</div>
        </div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;">
            <div class="stat-card"><div style="font-size:24px;">🪙</div><div style="font-size:28px;font-weight:900;">${wallet.coins || 0}</div><div style="font-size:11px;opacity:0.5;">Монет</div></div>
            <div class="stat-card"><div style="font-size:24px;">🏆</div><div style="font-size:28px;font-weight:900;">${user.games_played || 0}</div><div style="font-size:11px;opacity:0.5;">Игр</div></div>
            <div class="stat-card"><div style="font-size:24px;">✅</div><div style="font-size:28px;font-weight:900;">${user.correct_answers || 0}</div><div style="font-size:11px;opacity:0.5;">Ответов</div></div>
            <div class="stat-card"><div style="font-size:24px;">🔥</div><div style="font-size:28px;font-weight:900;">${user.streak_days || 0}</div><div style="font-size:11px;opacity:0.5;">Дней</div></div>
        </div>

        <div style="font-weight:800;font-size:18px;margin-top:20px;">🏅 Достижения</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;">
            ${[
                {icon:'🎮',name:'Первая игра',unlocked:true},
                {icon:'🏆',name:'Победитель',unlocked:(user.games_played||0)>=5},
                {icon:'🔥',name:'7 дней',unlocked:(user.streak_days||0)>=7},
                {icon:'💯',name:'100 очков',unlocked:(wallet.coins||0)>=100},
                {icon:'👑',name:'Король',unlocked:false},
                {icon:'🌟',name:'Легенда',unlocked:false}
            ].map(a => `
                <div style="background:rgba(255,255,255,0.5);padding:12px 8px;border-radius:12px;text-align:center;${a.unlocked?'':'opacity:0.4;filter:grayscale(0.5);'}">
                    <div style="font-size:30px;">${a.icon}</div>
                    <div style="font-size:11px;font-weight:700;">${a.name}</div>
                </div>`).join('')}
        </div>

        <button class="btn" onclick="window.location.href='/'">🎮 Играть</button>
        <button class="btn btn-outline" onclick="switchPage('shop')">🛍 Магазин</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>`;
}

// ========== МАГАЗИН ==========
function renderShop() {
    const main = document.getElementById('mainContent');
    const wallet = JSON.parse(localStorage.getItem('wallet') || '{}');
    const premium = JSON.parse(localStorage.getItem('premium') || '{"active":false}');
    let coins = wallet.coins || 0;

    main.innerHTML = `
        ${premium.active ? `
        <div class="premium-card">
            <div class="badge">👑 Premium активен</div>
            <div style="font-size:14px;margin-top:4px;">До ${premium.until || '...'}</div>
            <div class="features">✅ Все игры | ✅ 20 игроков | ✅ Удвоенные монеты</div>
        </div>` : `
        <div style="background:rgba(255,255,255,0.5);border-radius:16px;padding:16px;margin-bottom:15px;">
            <div style="font-weight:800;">Free</div>
            <button class="btn btn-sm" style="margin-top:8px;" onclick="togglePremium()">Premium ✨ (500🪙)</button>
        </div>`}
        
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;">
            <div>🪙 <b id="shopCoins">${coins}</b></div>
            <div style="display:flex;gap:5px;">
                <button class="btn btn-sm" onclick="filterShop('all')">Все</button>
                <button class="btn btn-sm" onclick="filterShop('avatar')">Аватары</button>
                <button class="btn btn-sm" onclick="filterShop('frame')">Рамки</button>
                <button class="btn btn-sm" onclick="filterShop('boost')">Бустеры</button>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="shopGrid"></div>`;

    window.shopItems = [
        {id:1,icon:'🦊',name:'Лиса',cat:'avatar',price:50},
        {id:2,icon:'🐼',name:'Панда',cat:'avatar',price:50},
        {id:3,icon:'🦁',name:'Лев',cat:'avatar',price:80},
        {id:4,icon:'🦄',name:'Единорог',cat:'avatar',price:100},
        {id:5,icon:'🖼',name:'Рамка Золото',cat:'frame',price:80},
        {id:6,icon:'🖼',name:'Рамка Неон',cat:'frame',price:60},
        {id:7,icon:'⚡',name:'Буст x2',cat:'boost',price:30},
        {id:8,icon:'⏱',name:'+10 сек',cat:'boost',price:20},
    ];
    renderShopItems(shopItems);
}

function renderShopItems(items) {
    const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');
    const owned = JSON.parse(localStorage.getItem('ownedItems') || '[]');
    const grid = document.getElementById('shopGrid');
    if (!grid) return;
    grid.innerHTML = items.map(item => {
        const isOwned = owned.includes(item.id);
        const isEq = equipped.avatar === item.icon || equipped.frame === item.icon;
        return `<div class="shop-card ${isEq?'equipped':isOwned?'owned':''}" onclick="buyItem(${item.id})">
            <div style="font-size:40px;">${item.icon}</div>
            <div style="font-weight:700;">${item.name}</div>
            <div style="font-size:14px;color:#7c3aed;margin-top:4px;">${isEq?'Надето':isOwned?'Надеть':'🪙'+item.price}</div>
        </div>`;
    }).join('');
}

function filterShop(cat) {
    renderShopItems(cat === 'all' ? shopItems : shopItems.filter(i => i.cat === cat));
}

function buyItem(id) {
    const item = shopItems.find(i => i.id === id);
    if (!item) return;
    const owned = JSON.parse(localStorage.getItem('ownedItems') || '[]');
    if (owned.includes(id)) {
        const eq = JSON.parse(localStorage.getItem('equipped') || '{}');
        if (item.cat === 'avatar') eq.avatar = item.icon;
        else if (item.cat === 'frame') eq.frame = item.icon;
        localStorage.setItem('equipped', JSON.stringify(eq));
        renderShopItems(shopItems);
        showToast(`${item.icon} надето!`);
        return;
    }
    if (WALLET.spendCoins(item.price)) {
        owned.push(id);
        localStorage.setItem('ownedItems', JSON.stringify(owned));
        document.getElementById('shopCoins').textContent = WALLET.getCoins();
        renderShopItems(shopItems);
        showToast(`Куплено: ${item.name}!`);
    } else {
        showToast('Недостаточно монет 😢');
    }
}

function togglePremium() {
    const premium = JSON.parse(localStorage.getItem('premium') || '{"active":false}');
    if (premium.active) { showToast('Premium уже активен!'); return; }
    if (WALLET.spendCoins(500)) {
        premium.active = true;
        premium.until = new Date(Date.now() + 30*24*60*60*1000).toLocaleDateString('ru-RU');
        localStorage.setItem('premium', JSON.stringify(premium));
        showToast('Premium активирован! 🎉');
        renderShop();
    } else {
        showToast('Недостаточно монет (нужно 500 🪙)');
    }
}

// ========== КОШЕЛЁК ==========
function renderWallet() {
    const main = document.getElementById('mainContent');
    const wallet = JSON.parse(localStorage.getItem('wallet') || '{}');
    const history = [
        {icon:'🎮',title:'Победа в Квиз-Шоу',date:'Сегодня',amount:'+50',plus:true},
        {icon:'🎯',title:'Участие в игре',date:'Вчера',amount:'+10',plus:true},
        {icon:'🛍',title:'Аватар Панда',date:'Вчера',amount:'-50',plus:false},
        {icon:'🪙',title:'Ежедневный бонус',date:'2 дня назад',amount:'+20',plus:true},
    ];
    main.innerHTML = `
        <div style="text-align:center;">
            <div style="font-size:10vh;">🪙</div>
            <div style="font-size:6vh;font-weight:900;">${wallet.coins || 0}</div>
            <div style="opacity:0.5;margin-bottom:15px;">монет на счету</div>
        </div>
        <button class="btn" onclick="switchPage('shop')">🛍 В магазин</button>
        <div style="font-weight:800;font-size:18px;margin-top:25px;">📋 История</div>
        <div style="margin-top:10px;">
            ${history.map(h => `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05);">
                    <span style="font-size:24px;">${h.icon}</span>
                    <div style="flex:1;margin-left:10px;">
                        <div style="font-weight:700;">${h.title}</div>
                        <div style="font-size:12px;opacity:0.5;">${h.date}</div>
                    </div>
                    <div style="font-weight:800;color:${h.plus?'#22c55e':'#ef4444'};">${h.amount} 🪙</div>
                </div>`).join('')}
        </div>`;
}

// ========== ОБЩЕЕ ==========
function renderPage(page) {
    if (page === 'profile') renderProfile();
    else if (page === 'shop') renderShop();
    else if (page === 'wallet') renderWallet();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

async function uploadAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const fd = new FormData();
    fd.append('avatar', file);
    fd.append('user_id', user.id || 'guest');
    try {
        const r = await fetch('/api/upload-avatar', { method: 'POST', body: fd });
        const d = await r.json();
        if (d.avatar_url) {
            const eq = JSON.parse(localStorage.getItem('equipped') || '{}');
            eq.avatar = d.avatar_url;
            localStorage.setItem('equipped', JSON.stringify(eq));
            renderProfile();
            showToast('Фото обновлено!');
        }
    } catch(e) { showToast('Ошибка загрузки'); }
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    localStorage.removeItem('wallet');
    localStorage.removeItem('equipped');
    localStorage.removeItem('premium');
    window.location.href = '/';
}

// Запуск
switchPage(urlParams.get('page') || 'profile');
</script>

</body>
</html>
