<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРИЩЕ — Магазин</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ededed; font-family: 'Rubik', sans-serif; overflow-x: hidden; color: #111; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 0 20px; }

        .nav {
            width: 100%; height: 12vh; min-height: 70px;
            background: rgba(255,255,255,0.4); border: 2px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-radius: 0 0 3vh 3vh; display: flex; align-items: center;
            justify-content: space-between; padding: 0 5vw;
            position: sticky; top: 0; z-index: 9999;
        }
        .nav-logo {
            width: 10vh; height: 10vh; min-width: 55px; min-height: 55px;
            border-radius: 50%; background: white; display: flex; align-items: center;
            justify-content: center; overflow: visible; border: 0.5vh solid #e3e3e3;
            margin-top: 5vh; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.1);
        }
        .nav-logo:hover { transform: scale(1.1); }
        .nav-logo img { width: 130%; height: 130%; object-fit: contain; margin-top: -3vh; }
        .nav-title {
            font-size: clamp(3vh, 5vw, 4vh); font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-back {
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3vh; padding: 1.5vh 3vw; font-weight: 700; cursor: pointer;
            transition: 0.3s; font-size: clamp(1.5vh, 2.5vw, 2vh);
        }
        .nav-back:hover { background: rgba(255,255,255,0.9); }

        .profile-badge {
            display: flex; align-items: center; gap: 1.5vw;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(18px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 5vh;
            padding: 1.5vh 2.5vw; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0.5vh 2vh rgba(0,0,0,0.08);
        }
        .profile-badge:hover { background: rgba(255,255,255,0.7); transform: scale(1.05); }
        .profile-avatar {
            width: 5vh; height: 5vh; min-width: 30px; min-height: 30px;
            border-radius: 50%; background: linear-gradient(135deg, #a53cff, #3fffd2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5vh; color: white;
        }
        .profile-text {
            font-size: clamp(1.5vh, 2.5vw, 2vh); font-weight: 600;
            color: #333; white-space: nowrap;
        }

        .balance-bar {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(18px);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 3vh;
            padding: 20px; margin: 30px 0; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .balance-value { font-size: clamp(3vh, 5vw, 4vh); font-weight: 900; }
        .balance-label { font-size: 12px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

        .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .category-tab {
            padding: 1.5vh 3vw; border-radius: 3vh; font-weight: 700; font-size: 14px;
            cursor: pointer; white-space: nowrap; transition: 0.3s;
            background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.5);
        }
        .category-tab.active { background: linear-gradient(90deg, #ff3d2e, #cc39ff); color: white; border: none; }

        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .shop-card {
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.6); border-radius: 2vh;
            padding: 20px 15px; text-align: center; transition: 0.3s; cursor: pointer;
            position: relative;
        }
        .shop-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .shop-card.owned { opacity: 0.7; border-color: #22c55e; background: rgba(34,197,94,0.05); }
        .shop-icon { font-size: 6vh; margin-bottom: 10px; display: block; }
        .shop-name { font-weight: 800; font-size: 16px; margin-bottom: 5px; }
        .shop-price {
            display: inline-block; padding: 1vh 2vw; border-radius: 3vh;
            background: rgba(124,58,237,0.1); color: #7c3aed; font-weight: 700; font-size: 14px;
        }
        .shop-badge {
            position: absolute; top: 10px; right: 10px;
            background: #22c55e; color: white; padding: 0.5vh 1.5vw; border-radius: 2vh;
            font-size: 11px; font-weight: 700;
        }
        .footer-space { height: 30px; }
        .toast {
            position: fixed; bottom: 5vh; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 1.5vh 4vw;
            border-radius: 999px; font-weight: 600; font-size: 14px;
            z-index: 11000; opacity: 0; transition: 0.4s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-logo" onclick="window.location.href='/'">
        <img src="/static/icons/logo.png" alt="ИГРИЩЕ" onerror="this.innerHTML='🎮'">
    </div>
    <button class="nav-back" onclick="window.location.href='/'">← Назад</button>
</nav>

<div class="container">

    <div class="balance-bar">
        <div class="profile-badge" onclick="window.location.href='/frontend/profile.html'">
            <div class="profile-avatar" id="profileAvatar2">👤</div>
            <span class="profile-text" id="profileText2">Профиль</span>
        </div>
        <div style="display:flex;align-items:center;gap:1vw;">
            <span style="font-size:4vh;">🪙</span>
            <div style="text-align:right;">
                <div class="balance-value coin-display" id="coinBalance">0</div>
                <div class="balance-label">монет</div>
            </div>
        </div>
    </div>

    <div class="category-tabs">
        <div class="category-tab active" onclick="filterShop('all', this)">Все</div>
        <div class="category-tab" onclick="filterShop('avatar', this)">👤 Аватары</div>
        <div class="category-tab" onclick="filterShop('skin', this)">🎨 Скины</div>
        <div class="category-tab" onclick="filterShop('boost', this)">⚡ Бусты</div>
    </div>

    <div class="shop-grid" id="shopGrid"></div>

    <button class="nav-back" style="width:100%;margin-bottom:20px;text-align:center;" onclick="window.location.href='/'">← На главную</button>
    <div class="footer-space"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/frontend/js/wallet.js"></script>
<script>
const user = JSON.parse(localStorage.getItem('user') || '{}');
const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');

// Плашки профиля
function updateProfileUI() {
    const avatar = WALLET.getAvatar() || (user.username ? user.username.charAt(0).toUpperCase() : '👤');
    document.querySelectorAll('#profileAvatar, #profileAvatar2').forEach(el => el.textContent = avatar);
    document.querySelectorAll('#profileText, #profileText2').forEach(el => el.textContent = user.username || 'Гость');
}
updateProfileUI();

// Баланс
WALLET.updateAllDisplays();

// Товары
const shopItems = [
    { id: 1, icon: '🦊', name: 'Аватар Лиса', category: 'avatar', price: 50 },
    { id: 2, icon: '🐼', name: 'Аватар Панда', category: 'avatar', price: 50 },
    { id: 3, icon: '🦁', name: 'Аватар Лев', category: 'avatar', price: 80 },
    { id: 4, icon: '🐸', name: 'Аватар Лягушка', category: 'avatar', price: 50 },
    { id: 5, icon: '🦄', name: 'Аватар Единорог', category: 'avatar', price: 100 },
    { id: 6, icon: '🎨', name: 'Скин Радуга', category: 'skin', price: 150 },
    { id: 7, icon: '🌙', name: 'Скин Ночь', category: 'skin', price: 120 },
    { id: 8, icon: '🔥', name: 'Скин Огонь', category: 'skin', price: 200 },
    { id: 9, icon: '⚡', name: 'Буст x2', category: 'boost', price: 30 },
    { id: 10, icon: '⏱', name: '+10 сек', category: 'boost', price: 20 },
];

function renderShop(items) {
    const equipped = JSON.parse(localStorage.getItem('equipped') || '{}');
    const ownedItems = WALLET.getOwnedItems();
    
    document.getElementById('shopGrid').innerHTML = items.map(item => {
        const owned = ownedItems.includes(item.id);
        const isEquipped = equipped.avatar === item.icon || equipped.skin === item.icon;
        
        let badge = '';
        if (isEquipped) badge = '<div class="shop-badge" style="background:#7c3aed;">Надето</div>';
        else if (owned) badge = '<div class="shop-badge">Куплено</div>';
        
        return `
            <div class="shop-card ${owned ? 'owned' : ''}" onclick="buyItem(${item.id})">
                ${badge}
                <span class="shop-icon">${item.icon}</span>
                <div class="shop-name">${item.name}</div>
                <div class="shop-price">${owned ? (isEquipped ? 'Надето' : 'Надеть') : '🪙 ' + item.price}</div>
            </div>`;
    }).join('');
}

function filterShop(cat, tab) {
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderShop(cat === 'all' ? shopItems : shopItems.filter(i => i.category === cat));
}

function buyItem(itemId) {
    if (WALLET.hasItem(itemId)) {
        equipItem(itemId);
        return;
    }
    
    const item = shopItems.find(i => i.id === itemId);
    if (!item) return;
    
    if (!WALLET.spendCoins(item.price)) {
        showToast('Недостаточно монет! 😢');
        return;
    }
    
    WALLET.addOwnedItem(itemId);
    renderShop(shopItems);
    showToast(`Куплено: ${item.name}! 🎉`);
}

function equipItem(itemId) {
    const item = shopItems.find(i => i.id === itemId);
    if (!item) return;
    
    WALLET.setAvatar(item.icon);
    updateProfileUI();
    showToast(`${item.icon} надет!`);
    renderShop(shopItems);
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

renderShop(shopItems);
</script>

</body>
</html>
